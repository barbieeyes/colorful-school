<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>선생님 대시보드 — 자생식물 관찰일지</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💚</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sans:'Noto Sans KR',sans-serif; --round:'Jua',sans-serif; --hand:'Gaegu',cursive;
  --cream:#FFFBF3; --paper:#fff;
  --mint:#A8E6CF; --mint-d:#6FCF97; --mint-dd:#3DA974;
  --peach-d:#FFAB76; --lav-d:#A88BC7;
  --ink:#4A4238; --ink-2:#8B8378; --ink-3:#B5AEA2;
  --line:#F0E8DB; --line-d:#E5D9C6;
  --꿀풀:#9575CD; --꿀풀-bg:#EDE7F6;
  --구절초:#FFA726; --구절초-bg:#FFF3E0;
  --층꽃나무:#66BB6A; --층꽃나무-bg:#E8F5E9;
}
body{ font-family:var(--sans); color:var(--ink); background:var(--cream); min-height:100vh; -webkit-font-smoothing:antialiased; padding-bottom:3rem; }

/* Header */
.top{ background:var(--paper); border-bottom:3px solid var(--line-d); padding:16px 20px; position:sticky; top:0; z-index:50; }
.top-inner{ max-width:1000px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.top .logo{ width:44px; height:44px; background:var(--mint-d); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; }
.top h1{ font-family:var(--round); font-size:20px; color:var(--ink); line-height:1.2; }
.top .sub{ font-size:11px; color:var(--ink-3); }
.btn-refresh{ margin-left:auto; font-family:var(--round); font-size:14px; color:#fff; background:var(--mint-d); border:none; border-radius:14px; padding:9px 18px; cursor:pointer; box-shadow:0 3px 0 var(--mint-dd); transition:transform .1s,box-shadow .1s; display:flex; align-items:center; gap:6px; }
.btn-refresh:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--mint-dd); }

.wrap{ max-width:1000px; margin:0 auto; padding:1.5rem 20px 0; }

/* Setup box */
.setup{ background:var(--paper); border:3px dashed var(--peach-d); border-radius:20px; padding:20px; margin-bottom:1.5rem; }
.setup h3{ font-family:var(--round); font-size:17px; color:var(--ink); margin-bottom:8px; }
.setup p{ font-size:13px; color:var(--ink-2); line-height:1.6; margin-bottom:12px; }
.setup input{ width:100%; font-family:var(--sans); font-size:13px; color:var(--ink); background:var(--cream); border:2.5px solid var(--line-d); border-radius:12px; padding:10px 12px; margin-bottom:10px; }
.setup input:focus{ outline:none; border-color:var(--mint-d); }
.setup button{ font-family:var(--round); font-size:14px; color:#fff; background:var(--mint-d); border:none; border-radius:12px; padding:10px 22px; cursor:pointer; box-shadow:0 3px 0 var(--mint-dd); }
.setup button:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--mint-dd); }

/* Stats */
.cheer-banner{ background:linear-gradient(135deg,#FFF3E0 0%,#EDE7F6 50%,#E8F5E9 100%); border:2.5px solid var(--line-d); border-radius:18px; padding:14px 18px; margin-bottom:1.25rem; font-family:var(--round); font-size:16px; color:var(--ink); text-align:center; line-height:1.5; }
.cheer-banner b{ color:var(--mint-dd); }
.stat-row{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:1.5rem; }
.stat{ border-radius:18px; padding:16px; text-align:center; border:3px solid transparent; }
.stat:nth-child(1){ background:#E8F5E9; border-color:#C8E6C9; }
.stat:nth-child(2){ background:var(--꿀풀-bg); border-color:#D1C4E9; }
.stat:nth-child(3){ background:var(--구절초-bg); border-color:#FFE0B2; }
.stat:nth-child(4){ background:#E3F2FD; border-color:#BBDEFB; }
.stat .sv{ font-family:var(--round); font-size:26px; color:var(--ink); line-height:1; }
.stat .sl{ font-size:11px; color:var(--ink-2); margin-top:4px; }

/* Filters */
.filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.25rem; align-items:center; }
.filter-label{ font-family:var(--round); font-size:13px; color:var(--ink-3); }
.chip-filter{ font-family:var(--round); font-size:13px; padding:7px 16px; border-radius:999px; border:2.5px solid var(--line-d); background:var(--paper); color:var(--ink-2); cursor:pointer; transition:transform .1s; }
.chip-filter:active{ transform:scale(.94); }
.chip-filter.on{ background:var(--mint-d); color:#fff; border-color:var(--mint-d); }
.chip-filter[data-plant="꿀풀"].on{ background:var(--꿀풀); border-color:var(--꿀풀); }
.chip-filter[data-plant="구절초"].on{ background:var(--구절초); border-color:var(--구절초); }
.chip-filter[data-plant="층꽃나무"].on{ background:var(--층꽃나무); border-color:var(--층꽃나무); }
.search-box{ font-family:var(--sans); font-size:13px; color:var(--ink); background:var(--paper); border:2.5px solid var(--line-d); border-radius:14px; padding:8px 14px; margin-left:auto; min-width:150px; }
.search-box:focus{ outline:none; border-color:var(--mint-d); }

/* Group */
.group{ margin-bottom:2rem; }
.group-head{ font-family:var(--round); font-size:18px; color:var(--ink); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.group-head .gh-count{ font-size:12px; color:var(--ink-3); font-family:var(--sans); }

/* 2단계 분류: 식물 섹션 */
.view-label{ font-family:var(--round); font-size:14px; color:var(--ink-2); display:flex; align-items:center; }

/* 날짜별 보기 */
.date-section{ margin-bottom:14px; }
.date-head{ width:100%; text-align:left; font-family:var(--round); font-size:17px; color:var(--ink); background:linear-gradient(120deg,#FFF3E0,#E8F1FC); border:2.5px solid var(--line-d); border-radius:16px; padding:14px 18px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:filter .12s; }
.date-head:hover{ filter:brightness(.97); }
.date-head .sh-arrow{ font-size:13px; color:var(--green-d); width:14px; }
.date-head .sh-count{ margin-left:auto; font-size:12px; color:var(--ink-2); font-family:var(--sans); font-weight:500; }

.plant-section{ margin-bottom:2.5rem; }
.plant-section-head{ font-family:var(--round); font-size:20px; color:var(--ink); padding:12px 18px; border-radius:16px; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.plant-section-head.꿀풀{ background:var(--꿀풀-bg); }
.plant-section-head.구절초{ background:var(--구절초-bg); }
.plant-section-head.층꽃나무{ background:var(--층꽃나무-bg); }
.plant-section-head .ps-count{ font-size:12px; color:var(--ink-2); font-family:var(--sans); font-weight:500; }

/* 학생 그룹 (접기/펼치기) */
.student-group{ margin-bottom:12px; margin-left:6px; }
.student-head{ width:100%; text-align:left; font-family:var(--round); font-size:16px; color:var(--ink); background:var(--paper); border:2.5px solid var(--line-d); border-radius:14px; padding:11px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background .12s; }
.student-head:hover{ background:var(--cream); }
.student-head .sh-arrow{ font-size:12px; color:var(--mint-dd); width:14px; }
.student-head .sh-count{ margin-left:auto; font-size:12px; color:var(--ink-3); font-family:var(--sans); }
.student-body{ padding:12px 0 4px; }

/* Card grid */
.card-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
.rec-card{ background:var(--paper); border:3px solid var(--line-d); border-radius:20px; overflow:hidden; box-shadow:0 4px 0 #EFE6D6; }
.rec-photo{ width:100%; height:170px; object-fit:cover; background:var(--cream); display:block; }
.rec-photo-none{ width:100%; height:100px; background:var(--cream); display:flex; align-items:center; justify-content:center; font-size:36px; color:var(--ink-3); }
.rec-body{ padding:14px 16px; }
.rec-top{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.rec-plant{ font-family:var(--round); font-size:13px; padding:3px 10px; border-radius:999px; }
.rec-plant.꿀풀{ background:var(--꿀풀-bg); color:var(--꿀풀); }
.rec-plant.구절초{ background:var(--구절초-bg); color:#C77D00; }
.rec-plant.층꽃나무{ background:var(--층꽃나무-bg); color:var(--층꽃나무); }
.rec-name{ font-family:var(--round); font-size:15px; color:var(--ink); }
.rec-date{ font-size:11px; color:var(--ink-3); margin-left:auto; }
.rec-del{ background:none; border:none; cursor:pointer; font-size:15px; padding:2px 4px; border-radius:8px; margin-left:6px; opacity:.55; transition:opacity .12s, background .12s; line-height:1; }
.rec-del:hover{ opacity:1; background:#FDE8E8; }
.rec-data{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:8px; }
.dcell{ background:var(--cream); border-radius:8px; padding:5px 6px; text-align:center; }
.dcell .dl{ font-size:9px; color:var(--ink-3); }
.dcell .dv{ font-family:var(--round); font-size:13px; color:var(--ink); }
.rec-poll{ display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.rp{ background:#E8F5E9; color:#43A047; font-family:var(--round); font-size:11px; padding:3px 9px; border-radius:999px; }
.rec-note{ font-size:12px; color:var(--ink-2); background:var(--cream); border-radius:10px; padding:7px 10px; margin-bottom:5px; line-height:1.5; }
.rec-mean{ font-size:11px; color:var(--mint-dd); display:flex; gap:4px; line-height:1.5; }

/* States */
.loading, .empty{ text-align:center; padding:4rem 1rem; color:var(--ink-3); }
.loading .le, .empty .ee{ font-size:48px; display:block; margin-bottom:12px; }
.loading .le{ animation:spin 1.2s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.empty p, .loading p{ font-family:var(--round); font-size:15px; color:var(--ink-2); line-height:1.6; }

/* Photo modal */
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:100; padding:1rem; }
.modal.show{ display:flex; }
.modal img{ max-width:100%; max-height:90vh; border-radius:16px; }
.modal-close{ position:absolute; top:20px; right:24px; font-size:36px; color:#fff; cursor:pointer; background:none; border:none; }
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <div class="logo">📊</div>
    <div>
      <h1>선생님 대시보드</h1>
      <div class="sub">🏫 송례중학교 · 자생식물 관찰일지</div>
    </div>
    <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>

<div class="wrap">

  <!-- 최초 설정 -->
  <div class="setup" id="setupBox">
    <h3>⚙️ 처음 한 번만 설정해요</h3>
    <p>학생 앱과 똑같은 <strong>구글시트 연동 주소(웹앱 URL)</strong>를 붙여넣으세요. 그러면 모든 학생 기록이 여기 모여요!</p>
    <input type="text" id="urlInput" placeholder="https://script.google.com/macros/s/..../exec" />
    <button onclick="saveUrl()">연결하기</button>
  </div>

  <div id="content"></div>

</div>

<!-- 사진 확대 모달 -->
<div class="modal" id="photoModal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="관찰 사진" />
</div>

<script>
const PLANT_EMOJI = { '꿀풀':'💜', '구절초':'🌼', '층꽃나무':'🌿' };
let allRecords = [];
let filterPlant = 'all';
let viewMode = 'plant'; // 'plant'(식물별) or 'date'(날짜별)
let searchText = '';
const openGroups = {}; // 학생 그룹 접기/펼치기 상태 기억

// 우리 학교 구글시트 주소 (미리 설정됨)
// URL의 ?sheet= 로 받으면 저장, 없으면 기기 저장값, 그것도 없으면 학교 기본 주소
const DEFAULT_URL='https://script.google.com/macros/s/AKfycbxJFHBZuO4GDtU0AXTKSbhi_MiUe5MPIP-ryNzAr-WKaaqNXgfXhUE6Tg-Luj4s00Yt/exec';
function getUrl(){
  try{
    const p=new URLSearchParams(location.search).get('sheet');
    if(p){ localStorage.setItem('dash_url', p); return p; }
  }catch(e){}
  return localStorage.getItem('dash_url') || DEFAULT_URL;
}
function saveUrl(){
  const u=document.getElementById('urlInput').value.trim();
  if(!u){ alert('주소를 입력해주세요!'); return; }
  localStorage.setItem('dash_url', u);
  document.getElementById('setupBox').style.display='none';
  loadData();
}

async function loadData(){
  const url=getUrl();
  if(!url){ return; }
  document.getElementById('setupBox').style.display='none';
  document.getElementById('content').innerHTML=`<div class="loading"><span class="le">🌱</span><p>학생들의 기록을 불러오는 중...</p></div>`;
  try{
    const r=await fetch(url, { method:'GET', redirect:'follow' });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    allRecords=(data.records||[]).filter(x=>x.date);
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty"><span class="ee">😅</span><p>데이터를 불러오지 못했어요.<br><br>이런 걸 확인해보세요:<br>① 연동 주소(URL)가 맞는지<br>② Apps Script를 <strong>업그레이드 코드</strong>로 바꿨는지<br>③ 배포 설정이 <strong>"모든 사용자"</strong>인지<br>④ 재배포(새 버전) 했는지</p><button onclick="showSetup()" style="margin-top:16px;font-family:'Jua',sans-serif;font-size:14px;color:#fff;background:#6FCF97;border:none;border-radius:12px;padding:10px 22px;cursor:pointer;">🔗 주소 다시 입력</button></div>`;
  }
}
function showSetup(){ document.getElementById('setupBox').style.display='block'; document.getElementById('content').innerHTML=''; }

function render(){
  const c=document.getElementById('content');
  if(!allRecords.length){
    c.innerHTML=`<div class="empty"><span class="ee">🌱</span><p>아직 기록이 없어요.<br>학생들이 관찰을 저장하면 여기에 나타나요!</p></div>`;
    return;
  }

  // 통계
  const plants=[...new Set(allRecords.map(r=>r.plant))];
  const students=[...new Set(allRecords.map(r=>r.name))].filter(Boolean);
  const withPhoto=allRecords.filter(r=>r.photo).length;

  let html=`<div class="cheer-banner">🌈 우리가 함께 <b>${allRecords.length}개</b>의 관찰을 기록했어요! 너희 덕분에 더 컬러풀해졌어! 💛</div>
  <div class="stat-row">
    <div class="stat"><div class="sv">${allRecords.length}</div><div class="sl">전체 기록</div></div>
    <div class="stat"><div class="sv">${students.length}</div><div class="sl">참여 학생</div></div>
    <div class="stat"><div class="sv">${plants.length}</div><div class="sl">관찰 식물</div></div>
    <div class="stat"><div class="sv">${withPhoto}</div><div class="sl">사진 기록</div></div>
  </div>`;

  // 보기 모드 전환 (식물별 / 날짜별)
  html+=`<div class="filters">
    <span class="view-label">📂 보기:</span>
    <button class="chip-filter ${viewMode==='plant'?'on':''}" onclick="setView('plant')">🌿 식물별</button>
    <button class="chip-filter ${viewMode==='date'?'on':''}" onclick="setView('date')">📅 날짜별</button>
  </div>`;

  // 식물 필터 + 검색 (식물별 볼 때만 식물 필터 표시)
  html+=`<div class="filters">
    ${viewMode==='plant'?`<button class="chip-filter ${filterPlant==='all'?'on':''}" onclick="setPlant('all')">🌈 전체 식물</button>
    ${['꿀풀','구절초','층꽃나무'].map(p=>`<button class="chip-filter ${filterPlant===p?'on':''}" data-plant="${p}" onclick="setPlant('${p}')">${PLANT_EMOJI[p]} ${p}</button>`).join('')}`:''}
    <input class="search-box" placeholder="🔍 이름 검색..." value="${esc(searchText)}" oninput="onSearch(this.value)" />
  </div>`;

  // 데이터 준비
  let recs=allRecords.slice();
  if(searchText) recs=recs.filter(r=>(r.name||'').includes(searchText));
  if(viewMode==='plant' && filterPlant!=='all') recs=recs.filter(r=>r.plant===filterPlant);
  recs.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!recs.length){
    html+=`<div class="empty"><span class="ee">🔍</span><p>기록이 없어요.</p></div>`;
    c.innerHTML=html;
    return;
  }

  if(viewMode==='date'){
    // ═══ 날짜별 보기: 날짜 → 그날 기록들 ═══
    const byDate={};
    recs.forEach(r=>{ const d=r.date||'날짜없음'; (byDate[d]=byDate[d]||[]).push(r); });
    // 최신 날짜부터
    const dateKeys=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
    dateKeys.forEach(date=>{
      const items=byDate[date];
      const gid='d_'+btoa(unescape(encodeURIComponent(date))).replace(/[^a-zA-Z0-9]/g,'');
      const isOpen=openGroups[gid]!==false;
      // 그날 참여한 학생 수
      const students=[...new Set(items.map(r=>r.name))].filter(Boolean).length;
      html+=`<div class="date-section">
        <button class="date-head" onclick="toggleGroup('${gid}')">
          <span class="sh-arrow" id="arrow-${gid}">${isOpen?'▼':'▶'}</span>
          📅 ${fmtDateFull(date)}
          <span class="sh-count">학생 ${students}명 · 기록 ${items.length}개</span>
        </button>
        <div class="student-body" id="body-${gid}" style="${isOpen?'':'display:none;'}">
          <div class="card-grid">${items.map(cardHtml).join('')}</div>
        </div>
      </div>`;
    });
    c.innerHTML=html;
    return;
  }

  // ═══ 식물별 보기: 식물 → 학생 (2단계) ═══
  const plantOrder=['꿀풀','구절초','층꽃나무'];
  const byPlant={};
  recs.forEach(r=>{ (byPlant[r.plant]=byPlant[r.plant]||[]).push(r); });

  // 식물 순서대로 (정의된 순서 먼저, 나머지는 뒤에)
  const plantKeys=[...plantOrder.filter(p=>byPlant[p]), ...Object.keys(byPlant).filter(p=>!plantOrder.includes(p))];

  plantKeys.forEach(plant=>{
    const plantRecs=byPlant[plant];
    const pe=PLANT_EMOJI[plant]||'🌱';
    // 그 식물 안에서 학생별로 다시 그룹
    const byStudent={};
    plantRecs.forEach(r=>{ const n=r.name||'이름없음'; (byStudent[n]=byStudent[n]||[]).push(r); });
    const studentKeys=Object.keys(byStudent).sort();

    html+=`<div class="plant-section">
      <div class="plant-section-head ${plant}">${pe} ${esc(plant)} <span class="ps-count">학생 ${studentKeys.length}명 · 기록 ${plantRecs.length}개</span></div>`;

    studentKeys.forEach(student=>{
      const items=byStudent[student];
      // 고유 id (펼치기 토글용)
      const gid='g_'+btoa(unescape(encodeURIComponent(plant+'|'+student))).replace(/[^a-zA-Z0-9]/g,'');
      const isOpen=openGroups[gid]!==false; // 기본 펼침
      html+=`<div class="student-group">
        <button class="student-head" onclick="toggleGroup('${gid}')">
          <span class="sh-arrow" id="arrow-${gid}">${isOpen?'▼':'▶'}</span>
          🙋 ${esc(student)}
          <span class="sh-count">${items.length}개 기록</span>
        </button>
        <div class="student-body" id="body-${gid}" style="${isOpen?'':'display:none;'}">
          <div class="card-grid">${items.map(cardHtml).join('')}</div>
        </div>
      </div>`;
    });

    html+=`</div>`;
  });

  c.innerHTML=html;
}

// 접기/펼치기 상태 기억
function toggleGroup(gid){
  const body=document.getElementById('body-'+gid);
  const arrow=document.getElementById('arrow-'+gid);
  if(!body) return;
  const nowOpen=body.style.display!=='none';
  if(nowOpen){ body.style.display='none'; arrow.textContent='▶'; openGroups[gid]=false; }
  else { body.style.display='block'; arrow.textContent='▼'; openGroups[gid]=true; }
}

function cardHtml(r){
  const pe=PLANT_EMOJI[r.plant]||'🌱';
  const cells=[
    r.temp!==''&&r.temp!=null?{l:'기온',v:r.temp+'°'}:null,
    r.height!==''&&r.height!=null?{l:'키',v:r.height}:null,
    r.ph!==''&&r.ph!=null?{l:'토양pH',v:r.ph}:null,
    r.moist!==''&&r.moist!=null?{l:'수분',v:r.moist}:null,
    r.humi!==''&&r.humi!=null?{l:'습도',v:r.humi+'%'}:null,
    r.health?{l:'건강',v:String(r.health).replace(/\s*\(\d\)/,'').slice(0,4)}:null
  ].filter(Boolean).slice(0,6);

  const photo = r.photo
    ? `<img class="rec-photo" src="${esc(r.photo)}" alt="관찰사진" onclick="openModalSrc(this.src)" onerror="this.outerHTML='<div class=\\'rec-photo-none\\'>🌱</div>'" />`
    : `<div class="rec-photo-none">🌱</div>`;

  const poll = r.pollinators ? `<div class="rec-poll">${String(r.pollinators).split(' / ').map(p=>`<span class="rp">🐝 ${esc(p)}</span>`).join('')}</div>` : '';

  // 삭제에 필요한 정보를 안전하게 인코딩 (한글 대응)
  const delKey=btoa(unescape(encodeURIComponent(JSON.stringify({plant:r.plant,date:r.date,name:r.name}))));

  return `<div class="rec-card">
    ${photo}
    <div class="rec-body">
      <div class="rec-top">
        <span class="rec-plant ${esc(r.plant)}">${pe} ${esc(r.plant)}</span>
        <span class="rec-name">${esc(r.name||'')}</span>
        <span class="rec-date">${fmtDate(r.date)}</span>
        <button class="rec-del" onclick="deleteRecord('${delKey}')" title="이 기록 삭제 (선생님용)">🗑️</button>
      </div>
      ${cells.length?`<div class="rec-data">${cells.map(c=>`<div class="dcell"><div class="dl">${esc(c.l)}</div><div class="dv">${esc(c.v)}</div></div>`).join('')}</div>`:''}
      ${poll}
      ${r.note?`<div class="rec-note">✏️ ${esc(r.note)}</div>`:''}
      ${r.mean?`<div class="rec-mean">💡 <span>${esc(r.mean)}</span></div>`:''}
    </div>
  </div>`;
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function openModalSrc(src){ document.getElementById('modalImg').src=src; document.getElementById('photoModal').classList.add('show'); }

// 기록 삭제 (선생님만 - 비밀번호 필요)
async function deleteRecord(delKey){
  let info;
  try{ info=JSON.parse(decodeURIComponent(escape(atob(delKey)))); }catch(e){ alert('삭제 정보를 읽지 못했어요.'); return; }
  const who=`${info.name} · ${info.plant} · ${info.date}`;
  if(!confirm(`이 기록을 삭제할까요?\n\n${who}\n\n삭제하면 되돌릴 수 없어요.`)) return;
  const pw=prompt('선생님 비밀번호를 입력하세요 🔐');
  if(pw===null) return;  // 취소
  if(!pw.trim()){ alert('비밀번호를 입력해주세요.'); return; }

  const url=getUrl();
  try{
    await fetch(url, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'delete', plant:info.plant, date:info.date, name:info.name, password:pw})
    });
    // no-cors라 응답을 못 읽으니, 잠깐 기다렸다 새로고침해서 확인
    alert('삭제 요청을 보냈어요. 잠시 후 목록을 새로고침합니다.\n\n(비밀번호가 틀렸다면 그대로 남아있어요.)');
    setTimeout(()=>loadData(), 1500);
  }catch(e){
    alert('삭제 중 문제가 생겼어요. 다시 시도해주세요.');
  }
}

function fmtDate(d){
  if(!d) return '';
  const s=String(d);
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[2]}.${m[3]}`;
  try{
    const dt=new Date(d);
    if(isNaN(dt.getTime())) return s.slice(0,10);  // 날짜로 못 읽으면 원본 앞부분
    return `${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
  }catch(e){ return s.slice(0,10); }
}

function setPlant(p){ filterPlant=p; render(); }
function setView(m){ viewMode=m; render(); }
function onSearch(v){ searchText=v; render(); }
// 날짜를 보기 좋게 (2026-07-15 → 2026년 7월 15일 화요일)
function fmtDateFull(d){
  if(!d) return '날짜없음';
  const s=String(d);
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return s;
  const dt=new Date(+m[1],+m[2]-1,+m[3]);
  const days=['일','월','화','수','목','금','토'];
  const dow=isNaN(dt.getTime())?'':' '+days[dt.getDay()]+'요일';
  return `${+m[1]}년 ${+m[2]}월 ${+m[3]}일${dow}`;
}
function closeModal(){ document.getElementById('photoModal').classList.remove('show'); }

// 시작: 저장된 주소 있으면 바로 로드
window.addEventListener('load',()=>{
  if(getUrl()){ document.getElementById('setupBox').style.display='none'; loadData(); }
  else {
    // 주소가 없으면(선생님이 아직 설정 안 함) 설정 안내를 보여줌
    document.getElementById('content').innerHTML=`<div class="empty"><span class="ee">🌱</span><p>아직 연동된 기록이 없어요.<br>선생님이 위에서 구글시트를 연결하면<br>친구들의 관찰 기록이 여기 모여요!</p></div>`;
  }
});
</script>
